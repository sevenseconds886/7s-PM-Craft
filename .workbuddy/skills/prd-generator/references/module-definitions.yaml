# 模块库完整定义
# prd-generator references — 各模块的 output_spec（输出规范）
# AI 在组装最终文档时按此规范生成每个模块的内容

modules:
  background:
    id: background
    name: 项目背景
    description: 业务痛点、用户场景、为什么要做
    required: false
    format: [text]
    output_spec: |
      ## 项目背景
      ### 现状与痛点
      [描述当前情况和存在的问题]
      ### 为什么要做
      [业务价值、用户价值]
      ### 用户场景
      [1-3个典型场景描述]

  goals:
    id: goals
    name: 目标与指标
    description: 北极星指标、成功标准、基线数据
    required: false
    format: [text, table]
    output_spec: |
      ## 目标与指标
      ### 北极星指标
      [1个核心指标，如"自助解决率从15%提升至45%"]
      ### 成功标准
      | 指标 | 基线 | 目标 | 衡量方式 |
      |------|------|------|---------|
      | [指标名] | [当前值] | [目标值] | [如何衡量] |

  roles:
    id: roles
    name: 用户角色
    description: 角色定义、权限矩阵、核心用户路径
    required: false
    format: [text, table]
    output_spec: |
      ## 用户角色
      | 角色 | 说明 | 核心操作 | 权限级别 |
      |------|------|---------|---------|
      | [角色名] | [谁] | [做什么] | [读/写/管理] |

  feature_map:
    id: feature_map
    name: 功能结构图
    description: 功能结构全景（flowchart LR 树形图）
    required: false
    format: [mermaid, drawio]
    output_spec: |
      ## 功能结构
      ```mermaid
      flowchart LR
        A[智能客服] --> B[对话引擎]
        A --> C[知识库]
        A --> D[人工转接]
        B --> B1[意图识别]
        B --> B2[多轮对话]
        C --> C1[FAQ库]
        C --> C2[文档检索]
      ```
      注意：使用 flowchart LR 而非 mindmap 关键字，渲染更稳定，PM-Craft 直接支持。

  flowchart:
    id: flowchart
    name: 流程图
    description: 核心业务流程、异常分支
    required: false
    format: [mermaid, drawio]
    output_spec: |
      ## 业务流程
      ```mermaid
      flowchart TD
        A[开始] --> B{判断条件}
        B -->|是| C[操作1]
        B -->|否| D[操作2]
        C --> E[结束]
        D --> E
      ```

  requirements:
    id: requirements
    name: 需求说明
    description: 用户故事、功能点、验收标准
    required: true
    format: [text, checklist]
    output_spec: |
      ## 需求说明
      ### 功能需求
      **FR-01 [功能名]**
      - 用户故事：作为[角色]，我希望[行为]，以便[价值]
      - 说明：[具体描述]
      - 验收标准：
        - [ ] [具体可验证的描述]

      **FR-02 [功能名]**
      ...

      ### 非目标
      - 本需求**不包含**：[明确不做的事]
      - [补充非目标项]

  pages:
    id: pages
    name: 页面设计
    description: 页面列表、交互说明、状态设计
    required: false
    format: [text, table]
    output_spec: |
      ## 页面设计
      | 页面 | 路径 | 核心元素 | 交互说明 |
      |------|------|---------|---------|
      | [页面名] | [/path] | [列表] | [描述] |

      ### 页面状态
      - 默认态：[描述]
      - 加载态：[描述]
      - 空状态：[描述]
      - 错误态：[描述]

  data_model:
    id: data_model
    name: 数据模型
    description: 核心实体、字段定义、关联关系
    required: false
    format: [text, table]
    output_spec: |
      ## 数据模型
      ### 核心实体
      | 实体 | 字段 | 类型 | 说明 | 必填 |
      |------|------|------|------|------|
      | [实体名] | [字段名] | [string/number/...] | [说明] | [是/否] |

      ### 实体关系
      [描述实体间的关联，如一对多、多对多]

  non_functional:
    id: non_functional
    name: 非功能需求
    description: 性能、安全、兼容性、合规
    required: false
    format: [text, checklist]
    output_spec: |
      ## 非功能需求
      ### 性能
      - [ ] [如：首屏加载 < 2s]
      ### 安全
      - [ ] [如：用户数据加密传输]
      ### 兼容性
      - [ ] [如：支持Chrome/Safari最新2个版本]
      ### 合规
      - [ ] [如：符合个人信息保护法要求]

  open_issues:
    id: open_issues
    name: 开放问题
    description: 待确认项、风险点、依赖
    required: false
    format: [text, table]
    output_spec: |
      ## 开放问题
      | # | 问题 | 影响 | 负责人 | 截止日期 | 状态 |
      |---|------|------|--------|---------|------|
      | 1 | [待确认问题] | [影响范围] | [谁负责] | [日期] | 待确认 |
