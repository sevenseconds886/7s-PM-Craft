<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录页面 - Web端原型</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-600 rounded-xl mx-auto mb-4 flex items-center justify-center">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">欢迎登录</h1>
      <p class="text-gray-500 mt-2">请输入手机号和验证码</p>
    </div>
    
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">手机号</label>
        <input type="tel" placeholder="请输入11位手机号" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">验证码</label>
        <div class="flex gap-3">
          <input type="text" placeholder="请输入验证码" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
          <button class="px-4 py-3 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-colors whitespace-nowrap">获取验证码</button>
        </div>
      </div>
      
      <button class="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">登录</button>
    </div>
    
    <div class="mt-6 text-center text-sm text-gray-500">
      登录即表示同意 <a href="#" class="text-blue-600 hover:underline">用户协议</a> 和 <a href="#" class="text-blue-600 hover:underline">隐私政策</a>
    </div>
  </div>
</body>
</html>
