<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录页面 - 移动端原型</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="bg-white min-h-screen">
    <!-- 顶部装饰 -->
    <div class="bg-blue-600 h-48 rounded-b-3xl relative overflow-hidden">
      <div class="absolute inset-0 opacity-20">
        <div class="absolute top-10 left-10 w-20 h-20 bg-white rounded-full"></div>
        <div class="absolute top-20 right-10 w-32 h-32 bg-white rounded-full"></div>
      </div>
      <div class="relative z-10 flex flex-col items-center justify-center h-full text-white">
        <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mb-3">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold">欢迎登录</h1>
        <p class="text-blue-100 text-sm mt-1">请输入手机号和验证码</p>
      </div>
    </div>
    
    <!-- 表单区域 -->
    <div class="px-6 -mt-6 relative z-20">
      <div class="bg-white rounded-2xl shadow-lg p-6">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">手机号</label>
            <input type="tel" placeholder="请输入11位手机号" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">验证码</label>
            <div class="flex gap-3">
              <input type="text" placeholder="请输入验证码" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
              <button class="px-4 py-3 bg-blue-100 text-blue-600 rounded-xl hover:bg-blue-200 transition-colors text-sm font-medium whitespace-nowrap">获取验证码</button>
            </div>
          </div>
          
          <button class="w-full py-3.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors font-medium shadow-lg shadow-blue-600/30">登录</button>
        </div>
      </div>
    </div>
    
    <!-- 底部 -->
    <div class="px-6 py-8 text-center">
      <p class="text-sm text-gray-500">
        登录即表示同意 <a href="#" class="text-blue-600">用户协议</a> 和 <a href="#" class="text-blue-600">隐私政策</a>
      </p>
    </div>
  </div>
</body>
</html>
